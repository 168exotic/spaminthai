name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      cloudflare_api_token:
        description: 'Cloudflare API token (only if CLOUDFLARE_API_TOKEN secret is missing)'
        required: false
        type: string

concurrency:
  group: deploy-spaminthai
  cancel-in-progress: true

env:
  PAGES_PROJECT: spaminthai
  # Default account; override with CLOUDFLARE_ACCOUNT_ID repo secret if needed
  CLOUDFLARE_ACCOUNT_ID: 2fa3f2f325707bab89ef1c7452d3adb8

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Resolve Cloudflare credentials
        id: cf
        env:
          INPUT_TOKEN: ${{ inputs.cloudflare_api_token }}
          SECRET_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SECRET_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          TOKEN="${INPUT_TOKEN:-${SECRET_TOKEN:-}}"
          if [ -z "$TOKEN" ]; then
            echo "::error title=Missing Cloudflare token::Add repository secret CLOUDFLARE_API_TOKEN (Account → Cloudflare Pages → Edit). See .github/SECRETS-SETUP.md"
            exit 1
          fi

          ACCOUNT="${SECRET_ACCOUNT:-2fa3f2f325707bab89ef1c7452d3adb8}"
          PROJECT="${PAGES_PROJECT:-spaminthai}"
          # Account-owned tokens (cfat_) do not work with /user/tokens/verify.
          # Deploy-only tokens may lack Account Read; Pages project GET is enough.
          if [[ "$TOKEN" == cfat_* ]]; then
            curl -fsS "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT}/pages/projects/${PROJECT}" \
              -H "Authorization: Bearer $TOKEN" > /tmp/verify.json
          else
            curl -fsS "https://api.cloudflare.com/client/v4/user/tokens/verify" \
              -H "Authorization: Bearer $TOKEN" > /tmp/verify.json
          fi
          python3 -c "import json; d=json.load(open('/tmp/verify.json')); assert d.get('success'), d"

          echo "account_id=$ACCOUNT" >> "$GITHUB_OUTPUT"
          echo "Cloudflare token verified for account $ACCOUNT"

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ steps.cf.outputs.account_id }}
          command: pages deploy . --project-name=${{ env.PAGES_PROJECT }} --branch=main

      - name: Verify deployment
        run: |
          set -euo pipefail
          echo "Checking Pages preview..."
          curl -fsSI "https://${PAGES_PROJECT}.pages.dev/" | head -1
          curl -fsS "https://${PAGES_PROJECT}.pages.dev/api/app" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d.get('downloadUrl') and d.get('version')"
          HTML=$(curl -fsS "https://${PAGES_PROJECT}.pages.dev/")
          echo "$HTML" | grep -q '0a0e1a' && echo "OK: dark landing theme detected" || echo "WARN: dark theme token not found in HTML"
          echo "$HTML" | grep -q '/api/lookup' && echo "OK: check widget wired to /api/lookup"
          echo "$HTML" | grep -qE 'releases/download/v1.0.[0-9]+' && echo "OK: APK download URL present"
