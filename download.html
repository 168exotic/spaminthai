<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ดาวน์โหลด SpamInThai บน Android</title>
<meta name="description" content="ติดตามสถานะดาวน์โหลดแอป SpamInThai และดาวน์โหลดเบอร์ตำรวจสำหรับเพิ่มลงรายชื่อบน Android">
<link rel="canonical" href="https://spaminthai.com/download">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--indigo:#4F46E5;--indigo-deep:#3730A3;--ink:#1E1B4B;--muted:#6B7280;--bg:#F8F9FF;--line:#E5E7F5;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--ink);line-height:1.65;min-height:100vh}
a{color:var(--indigo);text-decoration:none}
.wrap{max-width:560px;margin:0 auto;padding:40px 20px;text-align:center}
.logo{font-weight:700;font-size:1.2rem;margin-bottom:32px;display:inline-block}
.logo span{color:var(--indigo)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:32px 24px;box-shadow:0 4px 24px rgba(79,70,229,.08)}
h1{font-size:1.5rem;margin-bottom:8px}
p{color:var(--muted);margin-bottom:20px}
.dl-btn{display:inline-block;background:var(--indigo);color:#fff;padding:14px 32px;border-radius:99px;font-weight:700;font-size:1rem}
.dl-btn:hover{background:var(--indigo-deep);color:#fff}
.meta{margin-top:16px;font-size:.85rem;color:var(--muted)}
.notice{background:#F8F9FF;border:1px solid var(--line);border-radius:12px;padding:12px;margin:0 0 20px;font-size:.9rem}
.back{display:inline-block;margin-top:24px;font-size:.9rem}
</style>
</head>
<body>
<div class="wrap">
  <a class="logo" href="/">Spam<span>InThai</span></a>
  <div class="card">
    <h1>ดาวน์โหลดสำหรับ Android</h1>
    <p>APK ของ SpamInThai กำลังเตรียมปล่อย จึงไม่ส่งผู้ใช้ไปยังไฟล์ที่ยังไม่มีอยู่</p>
    <p class="notice" id="ver">กำลังโหลดข้อมูลดาวน์โหลด…</p>
    <a class="dl-btn" data-download data-ready-label="ดาวน์โหลด APK เวอร์ชันล่าสุด" data-pending-label="ดาวน์โหลดเบอร์ตำรวจ (police.vcf)" href="/download/police.vcf" download>ดาวน์โหลดเบอร์ตำรวจ (police.vcf)</a>
    <p class="meta">ไฟล์นี้เพิ่มสายด่วนตำรวจไซเบอร์และเบอร์ฉุกเฉินลงในรายชื่อได้ทันที</p>
  </div>
  <a class="back" href="/">← กลับหน้าแรก</a>
</div>
<footer style="text-align:center;padding:24px 0;font-size:.85rem;color:var(--muted)">spaminthai</footer>
<script src="/assets/site.js"></script>
<script>
fetch('/api/app').then(r=>r.json()).then(d=>{
  const date = new Date(d.updatedAt).toLocaleDateString('th-TH');
  document.getElementById('ver').textContent = d.status === 'available'
    ? 'เวอร์ชัน '+d.version+' · อัปเดต '+date
    : 'APK ยังไม่พร้อมให้ดาวน์โหลด · อัปเดตสถานะล่าสุด '+date;
}).catch(()=>{ document.getElementById('ver').textContent = 'ยังโหลดสถานะ APK ไม่ได้ แต่ปุ่มเบอร์ตำรวจยังใช้งานได้'; });
</script>
</body>
</html>
